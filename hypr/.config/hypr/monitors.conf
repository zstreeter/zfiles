# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# 1x scale for the ultrawides
env = GDK_SCALE,1

# Stacked ultrawides: Acer on top, Dell (primary) below.
# Laptop panel (eDP-1) is left to omarchy's lid switch: on when lid open, off when closed.
# Do NOT hardcode "eDP-1, disable" here — it hides the panel from hyprctl, so the lid
# handler writes a malformed "monitor=,disable" rule on close and breaks the externals.
# Match by description, not port: dock port names (DP-2/DP-7/DP-8...) shift between replugs.
monitor = desc:Acer Technologies Acer CZ340CK, 3440x1440@74.92, 0x0, 1
monitor = desc:Dell Inc. DELL U3818DW, 3840x1600@60, 0x1440, 1

# Fallback for any other monitor
monitor=,preferred,auto,1

# Good compromise for 27" or 32" 4K monitors (but fractional!)
# env = GDK_SCALE,1.75
# monitor=,preferred,auto,1.6

# Straight 1x setup for low-resolution displays like 1080p or 1440p
# env = GDK_SCALE,1
# monitor=,preferred,auto,1

# Example for Framework 13 w/ 6K XDR Apple display
# monitor = DP-5, 6016x3384@60, auto, 2
# monitor = eDP-1, 2880x1920@120, auto, 2

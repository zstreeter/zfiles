# zfiles audio routing — auto-prefer monitor speakers (HDMI/DP) when docked.
#
# Without these rules, WirePlumber's default-priority logic on this setup
# picks the ThinkPad USB-C Dock's analog stereo sink, whose 3.5mm jack is
# rarely connected to anything → silence. We bump HDMI/DP priority above
# everything else so monitor speakers win automatically when available,
# and we lower the dock's analog jack so the laptop's built-in speakers
# are preferred when external monitors aren't connected.
#
# WirePlumber re-evaluates priorities whenever sinks appear/disappear, so
# plugging/unplugging the dock just works — no script needed.
#
# Note: Bluetooth audio sinks have their own (higher) default priority
# (~3000) and are unaffected. BT headphones still win when paired.
#
# ── Card profile (which physical port carries audio) ────────────────────
# This file controls *which sink wins as default*, but the NVIDIA card has
# multiple HDMI/DP outputs and only one is active at a time per profile.
# The choice of profile is persisted by WirePlumber in
# ~/.local/state/wireplumber/default-profile (user state, not in this
# repo). For this laptop's setup:
#
#   output:hdmi-stereo         → port 0 → Acer CZ340CK
#   output:hdmi-stereo-extra1  → port 1 → Dell U3818DW   ← preferred
#
# Note: PulseAudio's reported `device.product.name` for these ports is
# swapped from reality on this hardware (an NVIDIA/dock EDID-vs-converter
# enumeration quirk) — the mapping above is what actually plays sound,
# verified by ear. If on a fresh setup the wrong monitor sounds, run:
#
#   pactl set-card-profile alsa_card.pci-0000_01_00.1 output:hdmi-stereo-extra1
#
# WirePlumber will then remember it.

monitor.alsa.rules = [
  {
    # External monitor speakers via DisplayPort/HDMI audio.
    # Matches the NVIDIA dGPU HDMI sink and any future HDMI/DP node.
    matches = [
      { node.name = "~.*\\.hdmi-stereo.*" }
    ]
    actions = {
      update-props = {
        priority.session = 2000
        priority.driver = 2000
      }
    }
  }
  {
    # ThinkPad USB-C Dock Gen2 analog jack — deprioritize so it doesn't
    # win as default. If headphones are plugged into the dock, select it
    # manually with `wpctl set-default <id>` (it'll stick for that session).
    matches = [
      { node.name = "~.*Lenovo.*USB-C_Dock.*analog-stereo" }
    ]
    actions = {
      update-props = {
        priority.session = 100
        priority.driver = 100
      }
    }
  }
]

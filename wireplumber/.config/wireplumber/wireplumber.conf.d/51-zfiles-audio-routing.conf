# zfiles audio routing — prefer the laptop's built-in speakers as default.
#
# History: an earlier version of this file blanket-prioritized every
# `*.hdmi-stereo*` sink to 2000, on the assumption that docked monitors
# would carry audio over HDMI/DP. In practice the connected displays on
# this rig do not advertise audio capability — ELD across every NVIDIA
# HDMI/DP pin reports `monitor_present 0`, `eld_valid 0` — so the HDMI
# sink that wins as "default" is a silent dead end, and switching outputs
# via the Omarchy menu gets clobbered on the next WirePlumber re-evaluate.
#
# New policy: the laptop's built-in analog stereo always wins as default.
# To route to HDMI/DP/dock audio explicitly, pick the sink in the Omarchy
# audio menu (or `wpctl set-default <id>`); WirePlumber's stream-restore
# remembers per-application selections, and the default only kicks in
# when an app has no remembered route.
#
# Bluetooth audio sinks have their own (higher) default priority (~3000)
# and are unaffected — BT headphones still win automatically when paired.
#
# ── If a future monitor DOES carry audio ────────────────────────────────
# Check it with: `cat /proc/asound/card*/eld*` — a working HDMI audio
# port shows `monitor_present 1`, `eld_valid 1`, and a `monitor_name`.
# If you want that monitor preferred, add a rule below matching its
# specific node.name and bump priority above 1500.

monitor.alsa.rules = [
  {
    # Laptop built-in analog stereo (Intel HDA, PCH 1f.3) — always win
    # as the default sink. Lifted above the ACP defaults for HDMI/DP so
    # a silent HDMI sink can't out-prioritize it.
    matches = [
      { node.name = "~alsa_output\\.pci-.*1f\\.3.*analog-stereo" }
    ]
    actions = {
      update-props = {
        priority.session = 2000
        priority.driver = 2000
      }
    }
  }
  {
    # NVIDIA dGPU HDMI/DP audio — deprioritize. None of the displays on
    # this rig report ELD audio support through the NVIDIA card, so this
    # sink is silent in practice. Keep it selectable but never default.
    matches = [
      { node.name = "~.*\\.hdmi-stereo.*" }
    ]
    actions = {
      update-props = {
        priority.session = 100
        priority.driver = 100
      }
    }
  }
]
